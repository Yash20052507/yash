# supermodel-ai/frontend/nginx.conf
server {
    listen 80;
    server_name localhost; # Can be replaced by your domain in production

    # Root directory for React app's static files
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve React app for all non-api, non-socket.io locations
    # This ensures that client-side routing works correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    # 'backend' will be the service name in docker-compose.yml
    # The port (e.g., 5000) should match the backend service's exposed port.
    location /api {
        proxy_pass http://backend:5000; # Assumes backend service is named 'backend' and listens on 5000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade; # Necessary for WebSocket connections if any API endpoint uses them
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host; # Preserve the original host header
        proxy_set_header X-Real-IP $remote_addr; # Pass real client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # List of IPs including proxies
        proxy_set_header X-Forwarded-Proto $scheme; # http or https
        proxy_cache_bypass $http_upgrade; # Bypass cache for upgraded connections

        # Optional: Increase timeout for long-running API requests if needed
        # proxy_connect_timeout 60s;
        # proxy_send_timeout 60s;
        # proxy_read_timeout 60s;
    }

    # Proxy WebSocket requests to the backend for Socket.IO
    # This specifically handles the /socket.io path used by Socket.IO clients.
    location /socket.io {
        proxy_pass http://backend:5000; # Assumes backend service is named 'backend'
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade; # Essential for WebSocket handshake
        proxy_set_header Connection "Upgrade";   # Essential for WebSocket handshake
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade; # Important for WebSockets not to be cached

        # Optional: Set higher timeouts for WebSockets if needed, though they are long-lived connections
        # proxy_read_timeout 86400s; # Example: 1 day, adjust as per application needs
        # proxy_send_timeout 86400s;
    }

    # Optional: Add custom error pages
    # error_page 500 502 503 504 /50x.html;
    # location = /50x.html {
    #     root /usr/share/nginx/html; # Or a dedicated error page directory
    # }

    # Optional: Basic security headers (Uncomment and customize as needed)
    # add_header X-Frame-Options "SAMEORIGIN" always;
    # add_header X-XSS-Protection "1; mode=block" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Consider a more comprehensive Content-Security-Policy
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws://localhost http://localhost;" always;
    # The above CSP is an example and needs to be tailored to your app's specific needs.
}
